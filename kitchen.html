<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ครัว — pos-lite</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F3F4F6;--ink:#111827;--sub:#6B7280;--line:#E5E7EB;--soft:#F9FAFB;
--new:#9CA3AF;--prep:#F97316;--ready:#3B82F6;--served:#22C55E;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
button{font-family:inherit;border:none;cursor:pointer}

.topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:19px}
.topbar .sub{font-size:12.5px;color:var(--sub);margin-top:2px}
.logout{background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-size:13.5px;color:var(--ink)}

.login-wrap{max-width:360px;margin:80px auto;background:#fff;border-radius:16px;padding:28px;border:1px solid var(--line)}
.login-wrap h2{font-size:19px;margin-bottom:16px;text-align:center}
.login-wrap input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none}
.login-wrap input:focus{border-color:var(--ink)}
.login-wrap button{width:100%;background:var(--ink);color:#fff;border-radius:10px;padding:13px;font-size:15px;font-weight:700}
.login-err{color:#DC2626;font-size:13px;text-align:center;margin-top:8px;min-height:18px}

.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;max-width:1400px;margin:0 auto}
.col{background:#fff;border-radius:var(--r);border:1px solid var(--line);display:flex;flex-direction:column;min-height:60vh}
.col-head{padding:14px 16px;font-weight:700;font-size:15px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.col-head .count{background:var(--soft);border-radius:999px;padding:2px 10px;font-size:13px;color:var(--sub)}
.col[data-status="new"] .col-head{color:var(--new)}
.col[data-status="preparing"] .col-head{color:var(--prep)}
.col[data-status="ready"] .col-head{color:var(--ready)}
.col-body{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px}
.empty{color:var(--sub);font-size:13.5px;text-align:center;padding:30px 10px}

.ticket{background:var(--soft);border-radius:12px;border:1px solid var(--line);padding:12px}
.ticket .tbl{font-weight:700;font-size:16px}
.ticket .time{font-size:12px;color:var(--sub);float:right}
.ticket ul{list-style:none;margin-top:8px}
.ticket li{font-size:14px;padding:3px 0;display:flex;justify-content:space-between;gap:8px}
.ticket li .n{font-weight:600}
.ticket li .note{display:block;font-size:12px;color:var(--sub)}
.ticket .act{width:100%;margin-top:10px;border-radius:8px;padding:10px;font-size:13.5px;font-weight:700;color:#fff}
.act.to-prep{background:var(--prep)}
.act.to-ready{background:var(--ready)}
.act.to-served{background:var(--served)}

@media (max-width:700px){
  .board{grid-template-columns:1fr;padding:12px;gap:12px}
  .topbar{padding:10px 14px}
  .topbar h1{font-size:16px}
  .col-head{font-size:14px;padding:12px 14px}
}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <img id="heroImgLogin" style="display:none;width:100%;max-height:140px;object-fit:cover;border-radius:12px;margin-bottom:16px">
  <h2>🔥 เข้าสู่ระบบ — จอครัว</h2>
  <input type="email" id="loginEmail" placeholder="อีเมล">
  <input type="password" id="loginPass" placeholder="รหัสผ่าน">
  <button id="loginBtn">เข้าสู่ระบบ</button>
  <div class="login-err" id="loginErr"></div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <img id="heroImgTop" style="display:none;width:38px;height:38px;border-radius:10px;object-fit:cover">
      <div>
        <h1>🍳 จอครัว</h1>
        <div class="sub" id="clock"></div>
      </div>
    </div>
    <button class="logout" id="logoutBtn">ออกจากระบบ</button>
  </div>
  <div class="board">
    <div class="col" data-status="new"><div class="col-head">🆕 รอคิว <span class="count" id="cnt-new">0</span></div><div class="col-body" id="col-new"></div></div>
    <div class="col" data-status="preparing"><div class="col-head">🔥 กำลังทำ <span class="count" id="cnt-preparing">0</span></div><div class="col-body" id="col-preparing"></div></div>
    <div class="col" data-status="ready"><div class="col-head">✅ พร้อมเสิร์ฟ <span class="count" id="cnt-ready">0</span></div><div class="col-body" id="col-ready"></div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA71ESNyfsMVV3inUmE24F5VzozhE-JIL8",
  authDomain: "pos-lite-2571d.firebaseapp.com",
  projectId: "pos-lite-2571d",
  storageBucket: "pos-lite-2571d.firebasestorage.app",
  messagingSenderId: "14718432688",
  appId: "1:14718432688:web:06568e6d05959671689275"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

// ===================== ธีมสี (พื้นหลังยังขาวสว่างเหมือนเดิม เปลี่ยนแค่โทนตัวหนังสือ/เส้น) =====================
// หมายเหตุ: สีสถานะ (ส้ม/ฟ้า/เขียว ของ 3 คอลัมน์) เป็นสีสื่อความหมาย ไม่เปลี่ยนตามธีม กันครัวสับสน
const THEMES = {
  navy:    { ink:'#1A2D42', sub:'#4A5A70', line:'#C0C8CA', soft:'#EEF1F2' },
  forest:  { ink:'#0B2B26', sub:'#235347', line:'#B9D6C7', soft:'#EAF5EE' },
  plum:    { ink:'#2B124C', sub:'#522B5B', line:'#DFB6B2', soft:'#FDF2EF' },
  lavender:{ ink:'#49225B', sub:'#6E3482', line:'#E7DBEF', soft:'#FBF6FD' },
  peach:   { ink:'#7A3B2E', sub:'#B5634A', line:'#FBD8C0', soft:'#FFF3E9' },
  rose:    { ink:'#4C1D3D', sub:'#852E4E', line:'#FBC4B9', soft:'#FFF1EC' },
};
function applyTheme_(key){
  const t = THEMES[key] || THEMES.navy;
  const r = document.documentElement.style;
  r.setProperty('--ink', t.ink); r.setProperty('--sub', t.sub);
  r.setProperty('--line', t.line); r.setProperty('--soft', t.soft);
}
async function loadKitchenTheme_(){
  try {
    const s = await getDoc(doc(db,'settings','shop'));
    if(s.exists()){
      const d = s.data();
      if(d.themeKitchen) applyTheme_(d.themeKitchen);
      if(d.heroUrl){
        $('heroImgLogin').src = d.heroUrl; $('heroImgLogin').style.display = 'block';
        $('heroImgTop').src = d.heroUrl; $('heroImgTop').style.display = 'block';
      }
    }
  } catch(e){}
}

// ===================== ล็อกอิน =====================
$('loginBtn').addEventListener('click', async () => {
  $('loginErr').textContent = '';
  try { await signInWithEmailAndPassword(auth, $('loginEmail').value.trim(), $('loginPass').value); }
  catch(e){ $('loginErr').textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'; }
});
$('logoutBtn').addEventListener('click', () => signOut(auth));
onAuthStateChanged(auth, user => {
  $('loginScreen').style.display = user ? 'none' : 'block';
  $('app').style.display = user ? 'block' : 'none';
  if(user) startListening();
});
loadKitchenTheme_(); // ธีมอ่านได้แม้ยังไม่ล็อกอิน เพื่อให้หน้า login ก็ใช้ธีมเดียวกัน

setInterval(() => { $('clock').textContent = 'อัปเดตล่าสุด ' + new Date().toLocaleTimeString('th-TH'); }, 1000);

// ===================== ออเดอร์สด =====================
let ORDERS = [];
function startListening(){
  onSnapshot(query(collection(db,'orders'), where('status','in',['new','preparing','ready'])), qs => {
    ORDERS = []; qs.forEach(d => ORDERS.push({id:d.id, ...d.data()}));
    ORDERS.sort((a,b)=>(a.createdAt?.toDate?.()?.getTime()||0)-(b.createdAt?.toDate?.()?.getTime()||0));
    render();
  }, e => console.warn('orders listener', e));
}

function timeAgo(o){
  const t = o.createdAt?.toDate?.();
  if(!t) return '';
  const mins = Math.max(0, Math.round((Date.now()-t.getTime())/60000));
  return mins+' นาทีที่แล้ว';
}

const NEXT = { new:['preparing','🔥 เริ่มทำ'], preparing:['ready','✅ พร้อมเสิร์ฟ'], ready:['served','🍽️ เสิร์ฟแล้ว'] };
function ticketHtml(o){
  const [nextStatus, label] = NEXT[o.status];
  const cls = nextStatus==='preparing'?'to-prep':nextStatus==='ready'?'to-ready':'to-served';
  const items = o.items.map(it => '<li><span class="n">'+it.name+' x'+it.qty+'</span>'+(it.note?'<span class="note">📝 '+it.note+'</span>':'')+'</li>').join('');
  return '<div class="ticket"><span class="time">'+timeAgo(o)+'</span><div class="tbl">โต๊ะ '+o.table+'</div>'+
    '<ul>'+items+'</ul>'+
    '<button class="act '+cls+'" data-id="'+o.id+'" data-next="'+nextStatus+'">'+label+'</button></div>';
}

function render(){
  ['new','preparing','ready'].forEach(st => {
    const rows = ORDERS.filter(o=>o.status===st);
    $('cnt-'+st).textContent = rows.length;
    $('col-'+st).innerHTML = rows.length ? rows.map(ticketHtml).join('') : '<div class="empty">ไม่มีรายการ</div>';
  });
  document.querySelectorAll('.act').forEach(b => b.addEventListener('click', async () => {
    try { await updateDoc(doc(db,'orders',b.dataset.id), {status: b.dataset.next}); }
    catch(e){ alert('อัปเดตไม่สำเร็จ: '+e.message); }
  }));
}
</script>
</body>
</html>
